<VirtualHost *:80>
    ServerName www.pagar.local
    DocumentRoot /srv/clients/pagar/public_html
    ErrorLog /var/log/hosting/apache_pagar/error.log
    CustomLog /var/log/hosting/apache_pagar/access.log combined
</VirtualHost>

